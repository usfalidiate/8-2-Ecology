<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        /* General Reset */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    overflow: hidden; /* Prevents scrolling */
}

/* Background Styling */
.background {
    background: url('your-image.jpg') no-repeat center center fixed;
    background-size: cover;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Profile Button */
.profile-button {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px 20px;
    font-size: 16px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    z-index: 10;
}
.profile-button:hover {
    background-color: #45a049;
}

/* Lesson Buttons Container */
.lesson-buttons {
    display: flex;
    flex-wrap: wrap; /* Allows buttons to wrap into multiple rows */
    justify-content: center; /* Centers the buttons horizontally */
    align-items: center; /* Centers the buttons vertically in their row */
    gap: 15px; /* Adds space between buttons */
    max-width: 80%; /* Optional: limits the width of the button area */
}

/* Lesson Button Styling */
.lesson-button {
    width: 120px;
    height: 50px;
    background-color: #008CBA;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}
.lesson-button:hover {
    background-color: #005f73;
}
    </style>
</head>
<body>
    <div class="background">
        <!-- Profile Button -->
        <button class="profile-button" onclick="location.href='profile.html';">Profile</button>

        <!-- Lesson Buttons -->
        <div class="lesson-buttons">
            <button class="lesson-button">Lesson 1</button>
            <button class="lesson-button">Lesson 2</button>
            <button class="lesson-button">Lesson 3</button>
            <button class="lesson-button">Lesson 4</button>
            <button class="lesson-button">Lesson 5</button>
            <button class="lesson-button">Lesson 6</button>
            <button class="lesson-button">Lesson 7</button>
            <button class="lesson-button">Lesson 8</button>
            <button class="lesson-button">Lesson 9</button>
            <button class="lesson-button">Lesson 10</button>
            <button class="lesson-button">Lesson 11</button>
            <button class="lesson-button">Lesson 12</button>
            <button class="lesson-button">Lesson 13</button>
            <button class="lesson-button">Lesson 14</button>
            <button class="lesson-button">Lesson 15</button>
        </div>
    </div>
</body>
</html>
