<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling */
        }

        /* Background Styling */
        .background {
            background: url('your-image.jpg') no-repeat center center fixed;
            background-size: cover;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Profile Button */
        .profile-button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }
        .profile-button:hover {
            background-color: #45a049;
        }

        /* Topic Buttons Container */
        .topic-buttons {
            display: flex;
            flex-wrap: wrap; /* Allows buttons to wrap into multiple rows */
            justify-content: center; /* Centers the buttons horizontally */
            align-items: center; /* Centers the buttons vertically in their row */
            gap: 15px; /* Adds space between buttons */
            max-width: 80%; /* Optional: limits the width of the button area */
        }

        /* Topic Button Styling */
        .topic-button {
            width: 200px;
            height: 60px;
            background-color: #FF5722;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .topic-button:hover {
            background-color: #E64A19;
        }
    </style>
</head>
<body>
    <div class="background">
        <!-- Profile Button -->
        <button class="profile-button" onclick="location.href='profile.html';">Profile</button>

        <!-- Topic Buttons -->
        <div class="topic-buttons">
            <button class="topic-button" onclick="location.href='topic1.html';">Topic 1</button>
            <button class="topic-button" onclick="location.href='topic2.html';">Topic 2</button>
            <button class="topic-button" onclick="location.href='topic3.html';">Topic 3</button>
            <button class="topic-button" onclick="location.href='topic4.html';">Topic 4</button>
            <button class="topic-button" onclick="location.href='topic5.html';">Topic 5</button>
            <button class="topic-button" onclick="location.href='topic6.html';">Topic 6</button>
            <button class="topic-button" onclick="location.href='topic7.html';">Topic 7</button>
            <button class="topic-button" onclick="location.href='topic8.html';">Topic 8</button>
        </div>
    </div>
</body>
</html>
