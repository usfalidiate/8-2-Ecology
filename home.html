<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling */
        }

        /* Background Styling */
        .background {
            background: url('your-image.jpg') no-repeat center center fixed; /* Sets the background image, centers it, and fixes it in place */
            background-size: cover; /* Ensures the background image covers the entire element */
            width: 100%; /* Sets the width of the background to 100% of its container */
            height: 100%; /* Sets the height of the background to 100% of its container */
            display: flex; /* Uses flexbox layout */
            flex-direction: column; /* Arranges children in a column */
            justify-content: center; /* Centers children vertically */
            align-items: center; /* Centers children horizontally */
        }

        /* Profile Button */
        .profile-button {
            position: absolute; /* Positions the button absolutely within its nearest positioned ancestor */
            top: 10px; /* Positions the button 10px from the top of its container */
            left: 10px; /* Positions the button 10px from the left of its container */
            padding: 10px 20px; /* Adds padding inside the button */
            font-size: 16px; /* Sets the font size of the button text */
            background-color: #4CAF50; /* Sets the background color of the button */
            color: white; /* Sets the text color of the button */
            border: none; /* Removes the default border */
            border-radius: 5px; /* Rounds the corners of the button */
            cursor: pointer; /* Changes the cursor to a pointer when hovering over the button */
        }
        .profile-button:hover {
            background-color: #45a049;
        }

        /* Topic Buttons Container */
        .topic-buttons {
            display: flex;
            flex-wrap: wrap; /* Allow buttons to wrap to the next line */
            justify-content: center; /* Center the buttons horizontally */
            gap: 20px; /* Add space between buttons */
            padding: 20px; /* Add padding around the container */
        }

        /* Topic Button Styling */
        .topic-button {
            flex: 0 1 20vw; /* Allow the button to grow and shrink, with a base width of 20vw */
            min-width: 200px; /* Minimum width to ensure readability */
            height: 10vw; /* Fixed height */
            background-color: #FF5722;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5vw; /* Responsive font size */
            font-weight: bold;
            padding: 10px; /* Add padding for better spacing */
            text-align: center; /* Center the text */
            overflow: hidden; /* Hide overflow */
            white-space: normal; /* Allow text to wrap */
            display: flex; /* Use flexbox for button content */
            align-items: center; /* Center content vertically */
            justify-content: center; /* Center content horizontally */
            text-overflow: ellipsis; /* Add ellipsis (...) for overflow text */
        }
        .topic-button:hover {
            background-color: #E64A19;
        }
    </style>
</head>
<body>
    <div class="background">
        <!-- Profile Button -->
        <button class="profile-button" onclick="location.href='profile.html';">Profile</button>

        <!-- Topic Buttons -->
        <div class="topic-buttons">
            <button class="topic-button" onclick="location.href='topic1.html';">Topic 1: Student Research Project</button>
            <button class="topic-button" onclick="location.href='topic2.html';">Topic 2: Ecology</button>
            <button class="topic-button" onclick="location.href='topic3.html';">Topic 3: The Earth</button>
            <button class="topic-button" onclick="location.href='topic4.html';">Topic 4: Forces</button>
            <button class="topic-button" onclick="location.href='topic5.html';">Topic 5: Elements, Compounds and Chemical Reactions</button>
            <button class="topic-button" onclick="location.href='topic6.html';">Topic 6: Inside the Human Body</button>
            <button class="topic-button" onclick="location.href='topic7.html';">Topic 7: Resources</button>
            <button class="topic-button" onclick="location.href='topic8.html';">Assessment</button>
        </div>
    </div>
</body>
</html>
