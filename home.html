<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling */
        }

        /* Background Styling */
        .background {
            background: url('your-image.jpg') no-repeat center center fixed; /* Sets the background image, centers it, and fixes it in place */
            background-size: cover; /* Ensures the background image covers the entire element */
            width: 100%; /* Sets the width of the background to 100% of its container */
            height: 100%; /* Sets the height of the background to 100% of its container */
            display: flex; /* Uses flexbox layout */
            flex-direction: column; /* Arranges children in a column */
            justify-content: center; /* Centers children vertically */
            align-items: center; /* Centers children horizontally */
        }

        /* Profile Button */
        .profile-button {
            position: absolute; /* Positions the button absolutely within its nearest positioned ancestor */
            top: 10px; /* Positions the button 10px from the top of its container */
            left: 10px; /* Positions the button 10px from the left of its container */
            padding: 10px 20px; /* Adds padding inside the button */
            font-size: 16px; /* Sets the font size of the button text */
            background-color: #4CAF50; /* Sets the background color of the button */
            color: white; /* Sets the text color of the button */
            border: none; /* Removes the default border */
            border-radius: 5px; /* Rounds the corners of the button */
            cursor: pointer; /* Changes the cursor to a pointer when hovering over the button */
        }
        .profile-button:hover {
            background-color: #45a049;
        }

        /* Topic Buttons Container */
        .topic-buttons {
            display: grid;
            gap: 1rem; /* Add space between buttons */
            padding: 1rem; /* Add padding around the container */
        }

        /* Responsive Grid Layout */
        @media (max-width: 379px) {
            .topic-buttons {
                grid-template-columns: 1fr; /* Single column */
            }
        }

        @media (min-width: 380px) and (max-width: 540px) {
            .topic-buttons {
                grid-template-columns: repeat(2, 1fr); /* Two columns */
            }
        }

        @media (min-width: 541px) and (max-width: 750px) {
            .topic-buttons {
                grid-template-columns: repeat(3, 1fr); /* Three columns */
            }
        }

        @media (min-width: 751px) {
            .topic-buttons {
                grid-template-columns: repeat(4, 1fr); /* Four columns */
            }
        }

        /* Topic Button Styling */
        .topic-button {
            width: 100%; /* Full width of the grid cell */
            height: 60px; /* Fixed height */
            background-color: #FF5722;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px; /* Fixed font size */
            font-weight: bold;
            padding: 10px; /* Add padding for better spacing */
            text-align: center; /* Center the text */
            overflow: hidden; /* Hide overflow */
            white-space: normal; /* Allow text to wrap */
            display: flex; /* Use flexbox for button content */
            flex-direction: column; /* Arrange text in a column */
            align-items: center; /* Center content horizontally */
            justify-content: center; /* Center content vertically */
        }
        .topic-button:hover {
            background-color: #E64A19;
        }

        /* Smaller text for topic names */
        .topic-name {
            font-size: 0.8em; /* Smaller font size */
            font-weight: normal; /* Normal font weight */
            text-align: center; /* Center the text */
            word-wrap: break-word; /* Wrap text if it gets too wide */
        }
    </style>
</head>
<body>
    <div class="background">
        <!-- Profile Button -->
        <button class="profile-button" onclick="location.href='profile.html';">Profile</button>

        <!-- Topic Buttons -->
        <div class="topic-buttons">
            <button class="topic-button" onclick="location.href='topic1.html';">Topic 1<br><span class="topic-name">Student Research Project</span></button>
            <button class="topic-button" onclick="location.href='topic2.html';">Topic 2<br><span class="topic-name">Ecology</span></button>
            <button class="topic-button" onclick="location.href='topic3.html';">Topic 3<br><span class="topic-name">The Earth</span></button>
            <button class="topic-button" onclick="location.href='topic4.html';">Topic 4<br><span class="topic-name">Forces</span></button>
            <button class="topic-button" onclick="location.href='topic5.html';">Topic 5<br><span class="topic-name">Elements, Compounds and Chemical Reactions</span></button>
            <button class="topic-button" onclick="location.href='topic6.html';">Topic 6<br><span class="topic-name">Inside the Human Body</span></button>
            <button class="topic-button" onclick="location.href='topic7.html';">Topic 7<br><span class="topic-name">Resources</span></button>
            <button class="topic-button" onclick="location.href='topic8.html';">Assessment</button>
        </div>
    </div>
</body>
</html>
