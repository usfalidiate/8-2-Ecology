<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <h1>Your Profile</h1>
        <div class="avatar-section">
            <h2>Avatar</h2>
            <img src="default-avatar.png" alt="Avatar" class="avatar">
            <button class="change-avatar">Change Avatar</button>
        </div>
        <div class="stats-section">
            <h2>Stats</h2>
            <p><strong>Synapse Points (SP):</strong> 150</p>
            <p><strong>Badges:</strong> 3</p>
        </div>
        <button class="back-button" onclick="location.href='home.html';">Back to Home</button>
    </div>
</body>
</html>
