<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <h1>Your Profile</h1>
        
        <!-- Avatar Section -->
        <div class="avatar-section">
            <h2>Avatar</h2>
            <div id="avatar-container" style="position: relative; width: 300px; height: 540px; margin: 0 auto; background: transparent;">
                <!-- Avatar layers dynamically generated -->
            </div>
        </div>
        
        <!-- Stats Section -->
        <div class="stats-section">
            <p id="synapse-points"><strong>Synapse Points (SP):</strong> Loading...</p>
            <p id="badges"><strong>Badges:</strong> Loading...</p>
        </div>
        
        <!-- Avatar Customisation Controls -->
        <div class="avatar-controls">
            <h3>Customise Avatar</h3>
            <label for="pants-select">Select Pants:</label>
            <select id="pants-select">
                <option value="DarkGreyPants.png">Dark Grey Pants</option>
                <option value="BrownPants.png">Brown Pants</option>
            </select>
            
            <label for="skin-select">Select Skin Tone:</label>
            <select id="skin-select">
                <option value="PaleSkin.png">Pale Skin</option>
                <option value="DarkerSkin.png">Darker Skin</option>
            </select>
        </div>

        <!-- Back Button -->
        <button class="back-button" onclick="location.href='home.html';">Back to Home</button>
    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
