<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
    <h1>Your Profile</h1>

    <!-- Avatar Section -->
    <div class="avatar-section">
        <h2>Avatar</h2>
        <div id="avatar-container">
            <!-- Avatar layers will be dynamically added here -->
        </div>
    </div>

    <!-- Stats Section -->
    <div class="stats-section">
        <p id="synapse-points"><strong>Synapse Points (SP):</strong> Loading...</p>
        <p id="badges"><strong>Badges:</strong> Loading...</p>
    </div>

    <!-- Customisation Button -->
    <div class="customisation-controls">
        <button id="customise-avatar-button">Customise Avatar</button>
    </div>

    <button id="logout-button">Log Out</button>
    <button class="back-button" onclick="location.href='home.html';">Back to Home</button>
</div>

<!-- Avatar Customisation Modal -->
<div id="customisation-modal" class="modal">
    <div class="modal-content">
        <div class="tab-container">
            <button class="tab" data-category="hair">Hair</button>
            <button class="tab" data-category="skin">Skin</button>
            <button class="tab" data-category="shoes">Shoes</button>
            <button class="tab" data-category="pants">Pants</button>
            <button class="tab" data-category="tops">Tops</button>
            <button class="tab" data-category="eyes">Eyes</button>
            <button class="tab" data-category="mouth">Mouth</button>
            <button class="tab" data-category="face">Face</button>
        </div>
        <div class="grid-container" id="customisation-grid">
            <!-- Customisation options will load dynamically here -->
        </div>
        <button id="close-modal">Close</button>
    </div>
</div>


    <script type="module" src="profile.js"></script>
</body>
</html>
