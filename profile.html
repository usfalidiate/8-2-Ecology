<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <h1>Your Profile</h1>
        
        <!-- Avatar Section -->
        <div class="avatar-section">
            <h2>Avatar</h2>
            <div id="avatar-container">
                <!-- Avatar layers will be dynamically added here -->
            </div>
        </div>
        
        <!-- Stats Section -->
        <div class="stats-section">
            <p id="synapse-points"><strong>Synapse Points (SP):</strong> Loading...</p>
            <p id="badges"><strong>Badges:</strong> Loading...</p>
        </div>
        
        <!-- Customisation Controls -->
        <div class="customisation-controls">
            <h3>Customise Avatar</h3>
            <label for="skin-select">Skin Tone:</label>
            <select id="skin-select"></select>

            <label for="pants-select">Pants:</label>
            <select id="pants-select"></select>

            <label for="tops-select">Tops:</label>
            <select id="tops-select"></select>

            <label for="eyes-select">Eyes:</label>
            <select id="eyes-select"></select>

            <label for="mouth-select">Mouth:</label>
            <select id="mouth-select"></select>

            <label for="face-select">Face:</label>
            <select id="face-select"></select>

            <label for="hair-select">Hair:</label>
            <select id="hair-select"></select>

            <label for="shoes-select">Shoes:</label>
            <select id="shoes-select"></select>
        </div>

        <button id="save-button">Save Customisations</button>
        <button id="logout-button">Log Out</button>
        <button class="back-button" onclick="location.href='home.html';">Back to Home</button>

    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
