<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic 4</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        /* Background Styling */
        .background {
            background: url('assets/daintreeBG1.jpg') no-repeat center center fixed;
            background-size: cover;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation Buttons Container */
        .nav-buttons {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
        }

        .nav-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .nav-button:hover {
            background-color: #45a049;
        }

        /* Lesson Buttons Container */
        .lesson-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 80%;
            margin-top: 20px;
        }

        /* Lesson Button Styling */
        .lesson-button {
            width: 120px;
            height: 50px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .lesson-button:hover {
            background-color: #005f73;
        }
    </style>
</head>
<body>
    <div class="background">
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <button class="nav-button" onclick="location.href='profile.html';">Profile</button>
            <button class="nav-button" onclick="location.href='home.html';">Back to Home</button>
        </div>

        <h1>Topic 4</h1>

        <!-- Lesson Buttons -->
        <div class="lesson-buttons">
            <button class="lesson-button">Lesson 1</button>
            <button class="lesson-button">Lesson 2</button>
            <button class="lesson-button">Lesson 3</button>
            <button class="lesson-button">Lesson 4</button>
            <button class="lesson-button">Lesson 5</button>
            <button class="lesson-button">Lesson 6</button>
            <button class="lesson-button">Lesson 7</button>
            <button class="lesson-button">Lesson 8</button>
            <button class="lesson-button">Lesson 9</button>
            <button class="lesson-button">Lesson 10</button>
            <button class="lesson-button">Lesson 11</button>
            <button class="lesson-button">Lesson 12</button>
            <button class="lesson-button">Lesson 13</button>
            <button class="lesson-button">Lesson 14</button>
            <button class="lesson-button">Lesson 15</button>
        </div>
    </div>
</body>
</html>
